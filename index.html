<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>منوی کافه</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- لوگو -->
    <div class="logo-box">
        <img src="assets/logo.png" id="logo">
    </div>

    <!-- دسته بندی -->
    <div class="categories">

        <button class="category active" data-category="همه">
            همه
        </button>

        <button class="category" data-category="نوشیدنی سرد">
            نوشیدنی سرد
        </button>

        <button class="category" data-category="نوشیدنی گرم">
            نوشیدنی گرم
        </button>

        <button class="category" data-category="تنقلات">
            تنقلات
        </button>

        <button class="category" data-category="صبحانه">
            صبحانه
        </button>

        <button class="category" data-category="سایر">
            سایر
        </button>

    </div>

    <!-- آیتم های منو -->
    <div id="products" class="products">

    </div>

    <!-- ویدیو -->
    <div class="video-box">

        <video controls preload="metadata">

            <source src="assets/video.mp4" type="video/mp4">

        </video>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
